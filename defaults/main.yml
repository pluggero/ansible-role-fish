---
fish_config_dir: "{{ ansible_env.HOME }}/.config/fish"
fish_config_file: "{{ fish_config_dir }}/config.fish"

fish_version: "4.8.1"
fish_install_method: "dynamic"
fish_force_install: false

fish_rustup_role: "pluggero.rustup"

fish_download_url: "https://github.com/fish-shell/fish-shell/archive/refs/tags/{{ fish_version }}.tar.gz"
fish_download_dir: "/tmp"

fish_functions_dir: "{{ fish_config_dir }}/functions"
fish_set_default_shell: false

fish_enable_vim_mode: false

fish_login_shell_commands: []
  # - exec /usr/bin/sway

fish_env_variables: []
  # - name: example
  #   value: "example"

fish_env_files: []
  # - "{{ ansible_env.HOME }}/.env_vars"

fish_abbreviations: []
  # - name: l
  #   value: "ls -lah"

fish_aliases: []
  # - name: example
  #   value: "example"

fish_colors: []
  # - name: fish_color_command
  #   value: "blue"
  #
  # Available variables (fish 4.5.0), name is the full variable name:
  # Syntax highlighting (fish_color_*): normal, command, keyword, quote, redirection,
  #   end, error, param, option, comment, selection, operator, escape, cwd, cwd_root,
  #   valid_path, autosuggestion, user, host, host_remote, cancel, search_match,
  #   history_current, status, gray
  # Pager (fish_pager_color_*): background, completion, description, prefix, progress,
  #   selected_background, selected_completion, selected_description, selected_prefix,
  #   secondary_background, secondary_completion, secondary_description, secondary_prefix
  #
  # Available named colors for `value` (from `set_color --print-colors`), or a hex
  # code like "#ffaf00":
  #   normal, black, red, green, yellow, blue, magenta, cyan, white,
  #   brblack, brred, brgreen, bryellow, brblue, brmagenta, brcyan, brwhite
  # Modifiers can be appended, e.g. value: "blue --bold" or "red --background=white":
  #   --bold, --dim, --italics, --underline, --reverse (-r)

fish_keybindings: []
  # - key: \co
  #   function: "clear_and_repaint"

# default functions are defined in files/functions/
fish_functions: []
  # - name: example
  #   description: "example"
  #   command: "example"

fish_additional_config: []
  # - "zoxide init fish | source"
